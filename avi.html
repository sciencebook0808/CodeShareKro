<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude 4.6 | Bytez Chat</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        pre { background-color: #1a1b26 !important; padding: 1rem; border-radius: 0.75rem; border: 1px solid #2f3549 !important; overflow-x: auto; }
        code { font-family: 'Fira Code', monospace !important; font-size: 0.85em !important; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 h-screen flex flex-col">

    <header class="h-14 border-b border-slate-800 bg-[#161b22]/50 backdrop-blur-md flex items-center justify-between px-6 sticky top-0 z-20">
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.5)]"></span>
            <h1 class="text-xs font-bold tracking-[0.2em] uppercase text-slate-400">Claude 4.6 Opus</h1>
        </div>
        <div id="status-indicator" class="text-[10px] font-mono text-slate-500 uppercase">System: <span id="status-text">Idle</span></div>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto chat-container p-4 md:px-24 lg:px-64 space-y-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center opacity-30">
            <p class="text-sm tracking-widest uppercase">Start Conversation</p>
        </div>
    </main>

    <footer class="p-6 bg-[#0b0e14]">
        <form id="chat-form" class="max-w-4xl mx-auto">
            <div class="relative flex items-center">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Type a message..." 
                    class="w-full bg-slate-900/40 border border-slate-800 rounded-2xl pl-5 pr-16 py-4 focus:outline-none focus:ring-1 focus:ring-blue-500/50 transition-all placeholder:text-slate-700"
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    id="send-btn"
                    class="absolute right-2 bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-sm font-semibold transition-all disabled:opacity-20"
                >
                    Send
                </button>
            </div>
        </form>
    </footer>

    <script>
        const API_KEY = "88ee4847f7e78937af3bec85fcca883a";
        const MODEL_ENDPOINT = "https://api.bytez.com/models/v2/anthropic/claude-opus-4-6";

        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusText = document.getElementById('status-text');

        let messageHistory = [];

        marked.setOptions({
            highlight: (code) => hljs.highlightAuto(code).value,
            breaks: true
        });

        function appendMessage(role, content, isError = false) {
            document.getElementById('empty-state')?.remove();
            const isUser = role === 'user';
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'} w-full`;

            msgDiv.innerHTML = `
                <div class="max-w-[90%] p-4 rounded-2xl ${
                    isUser 
                    ? 'bg-blue-600/10 border border-blue-500/20 text-blue-50' 
                    : isError 
                        ? 'bg-red-950/30 border border-red-500/50 text-red-200' 
                        : 'bg-slate-900/50 border border-slate-800 prose prose-invert prose-sm max-w-none'
                }">
                    ${isUser ? content : marked.parse(content)}
                </div>
            `;

            chatWindow.appendChild(msgDiv);
            msgDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text || sendBtn.disabled) return;

            userInput.value = '';
            appendMessage('user', text);
            messageHistory.push({ role: 'user', content: text });
            
            sendBtn.disabled = true;
            statusText.innerText = "Thinking...";

            try {
                const response = await fetch(MODEL_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Authorization': API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: messageHistory,
                        stream: false,
                        params: { 
                            // max_length changed to max_tokens (Claude's standard)
                            // min_length removed as it is not supported by Claude
                            max_tokens: 4096, 
                            temperature: 0.7 
                        }
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    // This will now catch "Extra inputs" errors and display them clearly
                    const errDetail = data.error?.message || data.error || JSON.stringify(data);
                    appendMessage('assistant', `**API Error:** ${errDetail}`, true);
                } else {
                    const aiResponse = data.output || data.response;
                    appendMessage('assistant', aiResponse);
                    messageHistory.push({ role: 'assistant', content: aiResponse });
                }
            } catch (err) {
                appendMessage('assistant', `**Network Error:** ${err.message}`, true);
            } finally {
                sendBtn.disabled = false;
                statusText.innerText = "Idle";
            }
        });
    </script>
</body>
  </html>
