<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude 4.6 | Bytez Chat</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        pre { margin-top: 1rem !important; margin-bottom: 1rem !important; border: 1px solid #334155 !important; }
        code { font-family: 'Fira Code', monospace !important; font-size: 0.9em !important; }
        .prose code::before, .prose code::after { content: "" !important; }
    </style>
</head>
<body class="bg-[#0f1117] text-slate-200 h-screen flex flex-col">

    <header class="h-16 border-b border-slate-800 bg-[#161b22]/80 backdrop-blur-md flex items-center justify-between px-6 sticky top-0 z-20">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white">B</div>
            <h1 class="text-sm font-semibold tracking-wide uppercase text-slate-400">Claude 4.6 <span class="text-blue-500">Opus</span></h1>
        </div>
        <div id="status-indicator" class="flex items-center gap-2 text-xs font-medium text-slate-500">
            <span id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500"></span>
            <span id="status-text">Ready</span>
        </div>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto chat-container p-4 md:p-8 space-y-6">
        <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-600 space-y-4">
            <svg class="w-12 h-12 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            <p class="text-lg font-light">Enter a prompt to start chatting with the model.</p>
        </div>
    </main>

    <footer class="p-4 bg-[#161b22] border-t border-slate-800">
        <form id="chat-form" class="max-w-4xl mx-auto flex gap-3">
            <input 
                type="text" 
                id="user-input" 
                placeholder="Ask Claude anything..." 
                class="flex-1 bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all placeholder:text-slate-600"
                autocomplete="off"
            >
            <button 
                type="submit" 
                id="send-btn"
                class="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 text-white px-6 py-3 rounded-xl font-semibold transition-all flex items-center gap-2"
            >
                <span>Send</span>
            </button>
        </form>
    </footer>

    <script>
        const API_KEY = "88ee4847f7e78937af3bec85fcca883a";
        const MODEL_ENDPOINT = "https://api.bytez.com/models/v2/anthropic/claude-opus-4-6";

        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');

        let messageHistory = [
            { role: 'system', content: 'You are a helpful AI assistant. Use Markdown for all formatting, including code blocks, bold text, and lists.' }
        ];

        // Markdown Configuration
        marked.setOptions({
            highlight: function(code, lang) {
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        function appendMessage(role, content, isError = false) {
            document.getElementById('empty-state')?.remove();

            const isUser = role === 'user';
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;

            const innerContent = `
                <div class="max-w-[85%] md:max-w-[75%] rounded-2xl p-4 shadow-xl ${
                    isUser 
                    ? 'bg-blue-700 text-white rounded-tr-none' 
                    : isError 
                        ? 'bg-red-900/20 border border-red-500/50 text-red-200 rounded-tl-none' 
                        : 'bg-slate-800 text-slate-100 border border-slate-700 rounded-tl-none prose prose-invert prose-blue'
                }">
                    <div class="text-xs mb-1 opacity-50 font-bold uppercase tracking-wider">
                        ${isUser ? 'You' : isError ? 'System Error' : 'Claude'}
                    </div>
                    <div class="message-body">
                        ${isUser ? content : marked.parse(content)}
                    </div>
                </div>
            `;

            msgDiv.innerHTML = innerContent;
            chatWindow.appendChild(msgDiv);
            
            // Syntax highlighting for code blocks
            msgDiv.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });

            chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text || sendBtn.disabled) return;

            // Update UI for sending state
            userInput.value = '';
            appendMessage('user', text);
            messageHistory.push({ role: 'user', content: text });
            
            setLoading(true);

            try {
                const response = await fetch(MODEL_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Authorization': API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        messages: messageHistory,
                        stream: false, // .json() requires stream: false
                        params: { temperature: 0.7, max_length: 4096 }
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    // Specific error from Bytez (e.g. 401, 404, 500)
                    const errorMessage = data.error || data.message || `API Error ${response.status}: ${response.statusText}`;
                    appendMessage('assistant', errorMessage, true);
                } else {
                    // Success path
                    const aiResponse = data.output || data.response;
                    if (aiResponse) {
                        appendMessage('assistant', aiResponse);
                        messageHistory.push({ role: 'assistant', content: aiResponse });
                    } else {
                        appendMessage('assistant', "Received an empty response from the model. Check your Bytez credits or model status.", true);
                    }
                }
            } catch (err) {
                // Network or connection errors
                appendMessage('assistant', `**Network Failure:** ${err.message}. Please check your internet connection or API Key.`, true);
            } finally {
                setLoading(false);
                userInput.focus();
            }
        });

        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            if (isLoading) {
                statusText.innerText = "Claude is thinking...";
                statusDot.classList.replace('bg-emerald-500', 'bg-amber-500');
                statusDot.classList.add('animate-pulse');
            } else {
                statusText.innerText = "Ready";
                statusDot.classList.replace('bg-amber-500', 'bg-emerald-500');
                statusDot.classList.remove('animate-pulse');
            }
        }
    </script>
</body>
</html>
